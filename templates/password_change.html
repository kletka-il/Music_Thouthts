{% extends "base.html" %}
{% block title %}Смена пароля{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>🔑 Смена пароля</h1>
    <form method="post">
        <div class="field">
            <label>Текущий пароль</label>
            <input type="password" name="old" required>
        </div>
        <div class="field">
            <label>Новый пароль (минимум 4 символа)</label>
            <input type="password" name="new" required minlength="4">
        </div>
        <button class="btn btn-primary w-full" type="submit">Обновить пароль</button>
    </form>
    <p class="text-dim mt-16 mb-0" style="text-align:center">
        <a href="{{ url_for('profile', username=current_user['username']) }}">← Вернуться в профиль</a>
    </p>
</div>
{% endblock %}
{% block side %}{% endblock %}
