{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Создание аккаунта</h1>
    <form method="post">
        <div class="field">
            <label>Логин</label>
            <input type="text" name="username" required maxlength="40">
        </div>
        <div class="field">
            <label>E-mail</label>
            <input type="email" name="email" required>
        </div>
        <div class="field">
            <label>Пароль (минимум 4 символа)</label>
            <input type="password" name="password" required minlength="4">
        </div>
        <div class="field">
            <label>Кем хочется быть на старте</label>
            <select name="role">
                <option value="viewer">Слушатель — читаю, голосую, комментирую</option>
                <option value="reviewer">Рецензент — буду писать рецензии</option>
            </select>
        </div>
        <p class="text-dim" style="font-size:13px;margin:0 0 12px">Роль модератора назначается только администрацией.</p>
        <button class="btn btn-primary w-full" type="submit">Создать аккаунт</button>
    </form>
    <p class="text-dim mt-16 mb-0" style="text-align:center">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
</div>
{% endblock %}
{% block side %}{% endblock %}
